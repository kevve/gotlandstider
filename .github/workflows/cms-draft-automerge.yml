name: Auto-Merge Decap Draft PRs

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: cms-draft-automerge-${{ github.event.pull_request.number || github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  merge-cms-drafts:
    runs-on: ubuntu-latest
    steps:
      - name: Merge eligible Decap draft pull requests
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const allowedDraftLabel = "decap-cms/draft";
            const branchPrefix = "cms/articles/";
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const unique = (values) => [...new Set(values)];

            const isAllowedChangedFile = (filename) => {
              if (filename.startsWith("content/articles/")) {
                return filename.endsWith(".md");
              }

              if (filename.startsWith("content/")) {
                return !filename.endsWith(".md");
              }

              return false;
            };

            const hasDraftTrueFrontMatter = (source) => {
              const frontMatterMatch = source.match(/^---\r?\n([\s\S]*?)\r?\n---/);
              if (!frontMatterMatch) {
                return false;
              }

              const frontMatter = frontMatterMatch[1];
              const draftMatch = frontMatter.match(/^draft:\s*(true|false)\s*$/m);
              return Boolean(draftMatch && draftMatch[1] === "true");
            };

            const resolvePullRequestNumbers = () => {
              if (context.eventName === "pull_request_target") {
                return [context.payload.pull_request.number];
              }

              if (context.eventName === "workflow_run") {
                const run = context.payload.workflow_run;
                if (run.name !== "CI") {
                  core.info(`Skipping workflow_run from ${run.name}`);
                  return [];
                }

                if (run.conclusion !== "success") {
                  core.info(`Skipping workflow_run with conclusion ${run.conclusion}`);
                  return [];
                }

                return (run.pull_requests || []).map((pr) => pr.number);
              }

              return [];
            };

            const branchProtectionGatePassed = async (pull_number, initialPr) => {
              let currentPr = initialPr;
              const maxAttempts = 6;

              for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                if (currentPr.mergeable_state === "clean") {
                  return true;
                }

                if (currentPr.mergeable_state && currentPr.mergeable_state !== "unknown") {
                  core.info(
                    `PR #${pull_number} mergeable_state is ${currentPr.mergeable_state}; skipping.`,
                  );
                  return false;
                }

                if (attempt < maxAttempts) {
                  core.info(
                    `PR #${pull_number} mergeable_state is unknown; retrying (${attempt}/${maxAttempts}).`,
                  );
                  await sleep(3000);
                  const refreshed = await github.rest.pulls.get({
                    owner,
                    repo,
                    pull_number,
                  });
                  currentPr = refreshed.data;
                }
              }

              core.info(`PR #${pull_number} mergeable_state remained unknown; skipping.`);
              return false;
            };

            const pullNumbers = unique(resolvePullRequestNumbers());
            if (pullNumbers.length === 0) {
              core.info("No pull requests to evaluate.");
              return;
            }

            for (const pull_number of pullNumbers) {
              core.info(`Evaluating PR #${pull_number}`);

              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number,
              });

              if (pr.state !== "open") {
                core.info(`PR #${pull_number} is not open.`);
                continue;
              }

              if (pr.base.ref !== "main") {
                core.info(`PR #${pull_number} base is ${pr.base.ref}, expected main.`);
                continue;
              }

              if (!pr.head.ref.startsWith(branchPrefix)) {
                core.info(`PR #${pull_number} head ${pr.head.ref} does not match ${branchPrefix}.`);
                continue;
              }

              if (!pr.head.repo || pr.head.repo.full_name !== `${owner}/${repo}`) {
                core.info(`PR #${pull_number} head repo is not ${owner}/${repo}.`);
                continue;
              }

              const labels = pr.labels.map((label) => label.name);
              if (!labels.includes(allowedDraftLabel)) {
                core.info(`PR #${pull_number} is not labeled ${allowedDraftLabel}.`);
                continue;
              }

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number,
                per_page: 100,
              });

              const disallowedFiles = files
                .map((file) => file.filename)
                .filter((filename) => !isAllowedChangedFile(filename));

              if (disallowedFiles.length > 0) {
                core.warning(
                  `PR #${pull_number} changes disallowed files: ${disallowedFiles.join(", ")}`,
                );
                continue;
              }

              const articleFiles = files
                .map((file) => file.filename)
                .filter((filename) => filename.startsWith("content/articles/") && filename.endsWith(".md"));

              if (articleFiles.length === 0) {
                core.info(`PR #${pull_number} has no changed article markdown files.`);
                continue;
              }

              let draftFrontMatterOk = true;

              for (const path of articleFiles) {
                const response = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path,
                  ref: pr.head.sha,
                });

                if (Array.isArray(response.data) || !("content" in response.data)) {
                  core.warning(`Could not read ${path} at ${pr.head.sha}.`);
                  draftFrontMatterOk = false;
                  break;
                }

                const encoding = response.data.encoding || "base64";
                const source = Buffer.from(response.data.content, encoding).toString("utf8");

                if (!hasDraftTrueFrontMatter(source)) {
                  core.warning(`File ${path} is not draft:true in front matter.`);
                  draftFrontMatterOk = false;
                  break;
                }
              }

              if (!draftFrontMatterOk) {
                continue;
              }

              const checkGatePassed = await branchProtectionGatePassed(pull_number, pr);
              if (!checkGatePassed) {
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number,
                  merge_method: "squash",
                  sha: pr.head.sha,
                });

                core.notice(`Merged PR #${pull_number} with squash merge.`);
              } catch (error) {
                core.warning(`Failed to merge PR #${pull_number}: ${error.message}`);
                continue;
              }

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${pr.head.ref}`,
                });

                core.notice(`Deleted branch ${pr.head.ref}.`);
              } catch (error) {
                if (error.status === 404 || error.status === 422) {
                  core.info(`Branch ${pr.head.ref} was already deleted or unavailable.`);
                  continue;
                }

                throw error;
              }
            }
