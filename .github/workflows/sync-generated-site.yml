name: Sync Generated Site Artifacts

on:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "scripts/**"
      - "templates/**"
      - "index.html"
      - "src/input.css"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: write

concurrency:
  group: sync-generated-site
  cancel-in-progress: true

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild generated site artifacts
        run: npm run build:site

      - name: Detect tracked output changes
        id: changes
        run: |
          set -eu

          if git diff --quiet -- \
            articles \
            generated \
            index.html \
            output.css \
            sitemap.xml
          then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated site artifacts
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -eu

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles generated index.html output.css sitemap.xml
          git commit -m "chore: sync generated site artifacts"
          git push
