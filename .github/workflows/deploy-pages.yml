name: Deploy Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate:content

      - name: Build generated content
        run: npm run build:content

      - name: Build static pages
        run: npm run build:pages

      - name: Build SEO output
        run: npm run build:seo

      - name: Build CSS
        run: npm run build

      - name: Stage Pages artifact
        run: |
          set -eu

          site_dir="_site"
          rm -rf "$site_dir"
          mkdir -p "$site_dir"

          for path in \
            articles \
            content \
            fonts \
            generated \
            videos \
            CNAME \
            favicon-v2.svg \
            index.html \
            navscripts.js \
            output.css \
            robots.txt \
            sitemap.xml \
            storyscripts.js
          do
            cp -R "$path" "$site_dir/$path"
          done

          rm -rf "$site_dir/content/articles" "$site_dir/content/videos"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
