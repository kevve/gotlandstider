<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{pageTitle}}</title>
  <meta name="description" content="{{metaDescription}}">
  <link rel="canonical" href="{{canonicalUrl}}">
  <meta property="og:type" content="{{ogType}}">
  <meta property="og:title" content="{{ogTitle}}">
  <meta property="og:description" content="{{ogDescription}}">
  <meta property="og:image" content="{{ogImage}}">
  <meta property="og:url" content="{{canonicalUrl}}">
  <meta property="og:site_name" content="Gotlandstider">
  <link rel="icon" type="image/svg+xml" href="{{faviconHref}}">
  <link rel="apple-touch-icon" href="{{faviconHref}}">
  <link href="{{cssHref}}" rel="stylesheet">
</head>
<body class="bg-gotland-stone text-gotland-deep font-sans antialiased selection:bg-gotland-rust selection:text-white">
  <div class="min-h-screen">
    {{siteHeader}}

    <main class="pb-20 pt-20">
      <section class="mx-auto max-w-6xl px-6 pt-10 lg:px-10 lg:pt-16">
        <a href="{{backHref}}" class="inline-flex items-center gap-2 text-sm font-bold uppercase tracking-[0.18em] text-gotland-pine transition-colors hover:text-gotland-rust">
          <span aria-hidden="true">←</span>
          {{backLabel}}
        </a>
      </section>

      <article class="mx-auto max-w-6xl px-6 pt-8 lg:px-10">
        <div class="grid gap-10 lg:grid-cols-[minmax(0,1fr)_minmax(280px,360px)] lg:items-start">
          <div class="space-y-6">
            <div class="space-y-4">
              <h1 class="font-serif text-4xl leading-tight text-gotland-deep md:text-6xl">{{articleTitle}}</h1>
              <p class="max-w-3xl text-xl leading-8 text-gotland-deep/80">{{articleExcerpt}}</p>
            </div>

            <div class="flex flex-wrap items-center gap-3">
              {{tagRow}}
            </div>

            {{socialLinks}}

            {{desktopBodySection}}
          </div>

          <div class="space-y-8 lg:col-start-2">
            {{mediaBlock}}
            {{desktopRelatedSection}}
          </div>

          {{mobileBodySection}}

          {{mobileRelatedSection}}
        </div>
      </article>
    </main>

    {{siteFooter}}
  </div>
  {{siteScripts}}
</body>
</html>
