<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{pageTitle}}</title>
  <meta name="description" content="{{metaDescription}}">
  <link rel="canonical" href="{{canonicalUrl}}">
  <meta property="og:type" content="video.other">
  <meta property="og:title" content="{{ogTitle}}">
  <meta property="og:description" content="{{ogDescription}}">
  <meta property="og:image" content="{{ogImage}}">
  <meta property="og:url" content="{{canonicalUrl}}">
  <meta property="og:site_name" content="Gotlandstider">
  <link rel="icon" type="image/svg+xml" href="{{faviconHref}}">
  <link rel="apple-touch-icon" href="{{faviconHref}}">
  <link href="{{cssHref}}" rel="stylesheet">
</head>
<body class="bg-gotland-stone text-gotland-deep font-sans antialiased selection:bg-gotland-rust selection:text-white">
  <div class="min-h-screen">
    <header class="border-b border-gotland-stoneDark bg-gotland-stone/95 backdrop-blur-md">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-6 lg:px-10">
        <a href="/" class="font-serif text-2xl font-semibold italic tracking-tight text-gotland-deep transition-colors hover:text-gotland-pine">
          Gotlandstider.
        </a>
        <nav class="flex items-center gap-5 text-xs font-bold uppercase tracking-[0.2em] text-gotland-deep/70">
          <a href="/" class="transition-colors hover:text-gotland-rust">Hem</a>
          <a href="/videos/" class="transition-colors hover:text-gotland-rust">Videor</a>
        </nav>
      </div>
    </header>

    <main class="pb-20">
      <section class="mx-auto max-w-6xl px-6 pt-10 lg:px-10 lg:pt-16">
        <a href="/videos/" class="inline-flex items-center gap-2 text-sm font-bold uppercase tracking-[0.18em] text-gotland-pine transition-colors hover:text-gotland-rust">
          <span aria-hidden="true">←</span>
          Tillbaka till videor
        </a>
      </section>

      <article class="mx-auto max-w-6xl px-6 pt-8 lg:px-10">
        <div class="grid gap-12 lg:grid-cols-[minmax(0,1.05fr)_minmax(300px,0.95fr)] lg:items-start">
          <div class="space-y-8">
            <div class="space-y-5">
              <p class="text-xs font-bold uppercase tracking-[0.2em] text-gotland-rust">{{providerLabel}}</p>
              <h1 class="font-serif text-4xl leading-tight text-gotland-deep md:text-6xl">{{videoTitle}}</h1>
              <p class="max-w-3xl text-xl leading-8 text-gotland-deep/80">{{videoExcerpt}}</p>
            </div>

            <dl class="grid gap-4 rounded-[2rem] border border-gotland-stoneDark bg-white/60 p-6 backdrop-blur-sm">
              <div>
                <dt class="text-xs font-bold uppercase tracking-[0.18em] text-gotland-pine">Publicerad</dt>
                <dd class="mt-2 text-base text-gotland-deep">{{publishedLabel}}</dd>
              </div>
            </dl>

            {{socialLinks}}
          </div>

          <div class="overflow-hidden rounded-[2rem] border border-gotland-stoneDark bg-white/60 shadow-xl">
            <img
              src="{{thumbnail}}"
              alt="{{thumbnailAlt}}"
              class="h-full w-full object-cover"
            >
          </div>
        </div>

        <div class="mt-14">
          {{mediaBlock}}
        </div>
      </article>
    </main>
  </div>
</body>
</html>
