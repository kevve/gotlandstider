<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{pageTitle}}</title>
  <meta name="description" content="{{metaDescription}}">
  <link rel="canonical" href="{{canonicalUrl}}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ogTitle}}">
  <meta property="og:description" content="{{ogDescription}}">
  <meta property="og:image" content="{{ogImage}}">
  <meta property="og:url" content="{{canonicalUrl}}">
  <meta property="og:site_name" content="Gotlandstider">
  <link rel="icon" type="image/svg+xml" href="{{faviconHref}}">
  <link rel="apple-touch-icon" href="{{faviconHref}}">
  <link href="{{cssHref}}" rel="stylesheet">
</head>
<body class="bg-gotland-stone text-gotland-deep font-sans antialiased selection:bg-gotland-rust selection:text-white">
  <div class="min-h-screen">
    {{siteHeader}}

    <main class="pt-20">
      <section class="relative overflow-hidden border-b border-gotland-stoneDark/70 bg-gradient-to-b from-gotland-stone to-white/40">
        <div class="mx-auto max-w-6xl px-6 py-20 lg:px-10 lg:py-28">
          <div class="max-w-3xl space-y-6">
            <p class="text-xs font-bold uppercase tracking-[0.2em] text-gotland-rust">Videoarkiv</p>
            <h1 class="font-serif text-5xl leading-tight text-gotland-deep md:text-6xl">{{pageHeading}}</h1>
            <p class="max-w-2xl text-lg leading-8 text-gotland-deep/80">{{lead}}</p>
          </div>
        </div>
      </section>

      <section class="mx-auto max-w-6xl px-6 py-14 lg:px-10 lg:py-20">
        <div class="grid gap-8 sm:grid-cols-2 xl:grid-cols-4">
          {{videoCards}}
        </div>
      </section>
    </main>

    {{siteFooter}}
  </div>
  {{siteScripts}}
</body>
</html>
